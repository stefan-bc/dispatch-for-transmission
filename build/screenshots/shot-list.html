<!DOCTYPE html>
<!-- Dev-only screenshot composer. Not shipped.
     Centres the popup (at its real 560×560) on a 1280×800 promo canvas
     with a subtle gradient + caption, for Web Store submission. -->
<html lang="en" data-theme="business">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../../css/app.css">
  <link rel="stylesheet" href="../../css/overrides.css">
  <style>
    html, body { margin: 0; padding: 0; }
    .stage {
      width: 1280px; height: 800px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 28px;
      background:
        radial-gradient(1200px 600px at 50% 0%, rgba(96, 165, 250, 0.12), transparent 60%),
        radial-gradient(900px 500px at 50% 100%, rgba(167, 139, 250, 0.08), transparent 60%),
        oklch(20% 0.02 250);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      color: #e6edf3;
      overflow: hidden;
    }
    .caption { text-align: center; max-width: 620px; }
    .caption h1 { margin: 0 0 6px; font-size: 24px; font-weight: 700; letter-spacing: -0.01em; }
    .caption p { margin: 0; font-size: 14px; opacity: 0.72; line-height: 1.45; }
    .frame {
      width: 560px; height: 560px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 30px 80px rgba(0,0,0,0.55),
        0 10px 30px rgba(0,0,0,0.4);
    }
    iframe {
      width: 560px; height: 560px; border: 0; display: block;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="caption">
      <h1>Control Transmission from your toolbar</h1>
      <p>Dense, dark, keyboard-first. Add, pause, and manage torrents across every server you own without leaving the browser.</p>
    </div>
    <div class="frame"><iframe src="../demo.html" scrolling="no"></iframe></div>
  </div>
</body>
</html>
